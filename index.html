<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow's Phase 0</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-container">
      <header>
        <h1>Welcome to StudyFlow</h1>
        <p>
          A simple assignment tracker to help students organize their classes,
          deadlines, and study tasks.
        </p>
      </header>

      <main>
        <section class="assignment-form-section">
          <h2>Add an Assignment</h2>

          <form id="assignment-form">
            <label for="assignment-name">Assignment Name</label>
            <input type="text" id="assignment-name" name="assignmentName" />

            <label for="class-name">Class Name</label>
            <input type="text" id="class-name" name="className" />

            <label for="due-date">Due Date</label>
            <input type="text" id="due-date" name="dueDate" />

            <label for="priority">Prority</label>
            <select id="priority" name="priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>

            <button type="submit">Add Assignment</button>
          </form>
        </section>

        <section class="filters-section">
          <h2>Filter Assignment</h2>

          <button type="button">All</button>
          <button type="button">Incompleted</button>
          <button type="button">Completed</button>
        </section>

        <section class="assignments-section">
          <h2>My Assignments</h2>

          <div id="assignment-list">
            <p>No Assignments Yet.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
